<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>My Reading Garden</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#2d1b0e;overflow:hidden;font-family:'Press Start 2P',monospace;
  user-select:none;-webkit-user-select:none;touch-action:none;height:100vh;width:100vw}
canvas{display:block}

/* HUD overlay */
#hud{position:fixed;top:0;left:0;width:100%;z-index:20;
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:12px 16px;pointer-events:none}
#hud>*{pointer-events:auto}

.hud-currency{display:flex;gap:16px}
.currency{display:flex;align-items:center;gap:6px;
  background:rgba(42,30,15,0.85);border:3px solid #5a3e1b;border-radius:4px;
  padding:6px 10px;font-size:9px;color:#fff;text-shadow:1px 1px 0 #000;
  box-shadow:inset -2px -2px 0 #3a2510,inset 2px 2px 0 #7a5a30}
.currency-icon{font-size:14px}
.currency-val{color:#ffe44d;min-width:24px;text-align:right}

#hud-right{display:flex;gap:10px}
.hud-btn{background:rgba(42,30,15,0.85);border:3px solid #5a3e1b;border-radius:4px;
  padding:6px 10px;font-size:14px;cursor:pointer;
  box-shadow:inset -2px -2px 0 #3a2510,inset 2px 2px 0 #7a5a30;
  transition:transform .1s}
.hud-btn:active{transform:scale(0.92)}

/* Interaction prompt — positioned near the target */
#prompt{position:fixed;z-index:30;
  font-size:clamp(10px,2.5vw,13px);color:#fff;text-align:center;
  line-height:2.4;word-spacing:0.15em;
  background:rgba(42,30,15,0.92);border:4px solid #5a3e1b;border-radius:6px;
  padding:14px 22px;
  box-shadow:4px 4px 0 rgba(0,0,0,0.3),inset 2px 2px 0 rgba(255,255,255,0.05);
  text-shadow:1px 1px 0 #000;
  opacity:0;transition:opacity .25s,top .15s ease-out,left .15s ease-out;
  transform:translateX(-50%);pointer-events:none;
  white-space:nowrap}
#prompt.show{opacity:1}
#prompt .prompt-title{color:#ffe44d;font-size:clamp(11px,2.8vw,14px);margin-bottom:6px}
#prompt .prompt-action{margin-top:10px;pointer-events:auto}
#prompt .prompt-btn{
  background:linear-gradient(180deg,#7cfc00 0%,#32cd32 100%);color:#fff;
  border:3px solid #1a5010;padding:8px 20px;font-size:9px;
  font-family:'Press Start 2P',monospace;border-radius:3px;cursor:pointer;
  box-shadow:inset -2px -2px 0 #1a5010,inset 2px 2px 0 #a0ff60,3px 3px 0 rgba(0,0,0,0.2);
  text-shadow:1px 1px 0 rgba(0,0,0,0.3);transition:transform .1s}
#prompt .prompt-btn:active{transform:scale(0.94)}
#prompt .prompt-btn.locked{
  background:linear-gradient(180deg,#888 0%,#666 100%);border-color:#444;
  box-shadow:inset -2px -2px 0 #444,inset 2px 2px 0 #aaa,3px 3px 0 rgba(0,0,0,0.2);
  cursor:default;opacity:0.6}

/* Shop overlay */
#shop-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:40;
  background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center}
#shop-overlay.off{display:none}
#shop-panel{
  background:linear-gradient(180deg,#5a3e1b 0%,#3a2510 100%);
  border:5px solid #8b6914;border-radius:8px;
  padding:20px;max-width:360px;width:90%;
  box-shadow:6px 6px 0 rgba(0,0,0,0.3),inset 2px 2px 0 rgba(255,255,255,0.08)}
#shop-title{font-size:14px;color:#ffe44d;text-align:center;margin-bottom:4px;
  text-shadow:2px 2px 0 rgba(0,0,0,0.4)}
#shop-sub{font-size:8px;color:#c9a86c;text-align:center;margin-bottom:16px}
.shop-item{display:flex;align-items:center;gap:10px;
  background:rgba(0,0,0,0.25);border:2px solid #5a3e1b;border-radius:4px;
  padding:10px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.shop-item:hover{border-color:#ffe44d}
.shop-item.bought{opacity:0.4;pointer-events:none}
.shop-icon{font-size:22px;width:32px;text-align:center}
.shop-info{flex:1}
.shop-name{font-size:9px;color:#fff;text-shadow:1px 1px 0 #000}
.shop-desc{font-size:7px;color:#c9a86c;margin-top:3px}
.shop-cost{font-size:9px;color:#ffe44d;text-shadow:1px 1px 0 #000;white-space:nowrap}
#shop-close{display:block;margin:12px auto 0;font-size:9px;color:#c9a86c;
  background:none;border:2px solid #5a3e1b;border-radius:3px;padding:8px 20px;
  font-family:'Press Start 2P',monospace;cursor:pointer;transition:border-color .15s}
#shop-close:hover{border-color:#ffe44d;color:#ffe44d}
</style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <div class="hud-currency">
    <div class="currency"><span class="currency-icon">🌱</span><span class="currency-val" id="seeds-val">5</span></div>
    <div class="currency"><span class="currency-icon">☀️</span><span class="currency-val" id="sun-val">3</span></div>
  </div>
  <div id="hud-right">
    <div class="hud-btn" id="shop-btn">🏪</div>
  </div>
</div>

<!-- Interaction prompt -->
<div id="prompt">
  <div class="prompt-title" id="prompt-title"></div>
  <div id="prompt-body"></div>
  <div class="prompt-action" id="prompt-action"></div>
</div>

<!-- Shop -->
<div id="shop-overlay" class="off">
  <div id="shop-panel">
    <div id="shop-title">Garden Shop</div>
    <div id="shop-sub">Spend your Seeds & Sunshine</div>
    <div id="shop-items"></div>
    <button id="shop-close">Close</button>
  </div>
</div>

<!-- Game canvas -->
<canvas id="game"></canvas>

<script>
// ══════════════════════════════════════
// CONFIG
// ══════════════════════════════════════
const TILE = 32;          // larger tiles for illustrated style
const MAP_W = 20;
const MAP_H = 15;
const PLAYER_SPEED = 3.2;

// ══════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════
let seeds = 5, sunshine = 3;
// Plots laid out along a winding path: bottom-left → upper-right (curriculum order)
const plots = [
  { id:'print',    x:1,  y:11, w:3, h:2, domain:'Print Concepts',        plant:'Grass',      icon:'🌿', stage:0, maxStage:5, color:'#6aaa3a', order:1 },
  { id:'letter',   x:5,  y:9,  w:3, h:2, domain:'Letter Knowledge',      plant:'Tulip Bulb', icon:'🌷', stage:0, maxStage:5, color:'#e84393', order:2 },
  { id:'phonol',   x:2,  y:6,  w:3, h:2, domain:'Rhyme Detection',       plant:'Apple Tree', icon:'🌳', stage:2, maxStage:5, color:'#00b894', order:3 },
  { id:'syllable', x:6,  y:3,  w:3, h:2, domain:'Syllable Counting',     plant:'Daisy',      icon:'🌼', stage:0, maxStage:5, color:'#fdcb6e', order:4 },
  { id:'alpha',    x:10, y:4,  w:3, h:2, domain:'Alphabetic Principle',  plant:'Carrots',    icon:'🥕', stage:0, maxStage:5, color:'#e17055', order:5 },
  { id:'decode',   x:13, y:7,  w:3, h:2, domain:'Decoding',              plant:'Vine',       icon:'🌿', stage:0, maxStage:5, color:'#55a86e', order:6 },
  { id:'encode',   x:16, y:3,  w:3, h:2, domain:'Encoding',              plant:'Sunflower',  icon:'🌻', stage:0, maxStage:5, color:'#fdcb6e', order:7 },
];

// Shop items
const SHOP_ITEMS = [
  { name:'Wooden Fence',   icon:'🪵', desc:'Border your garden',   cost:3, currency:'seeds', bought:false },
  { name:'Stone Path',     icon:'🪨', desc:'A nice walkway',       cost:2, currency:'seeds', bought:false },
  { name:'Birdbath',       icon:'🐦', desc:'Attract songbirds',    cost:5, currency:'sunshine', bought:false },
  { name:'Butterfly Net',  icon:'🦋', desc:'Catch butterflies',    cost:4, currency:'sunshine', bought:false },
  { name:'Watering Can',   icon:'🚿', desc:'Fancy golden can',     cost:8, currency:'seeds', bought:false },
  { name:'Beehive',        icon:'🐝', desc:'Bees help plants grow',cost:10,currency:'sunshine', bought:false },
];

// Decorations placed from shop
let decorations = [];

// Player
const player = { x:2, y:13, dir:'down', frame:0, frameTimer:0, moving:false };
let targetX = null, targetY = null;

// ══════════════════════════════════════
// CANVAS SETUP
// ══════════════════════════════════════
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let scale = 1;

function resize(){
  const vw = window.innerWidth, vh = window.innerHeight;
  scale = Math.min(vw / (MAP_W * TILE), vh / (MAP_H * TILE));
  canvas.width = MAP_W * TILE * scale;
  canvas.height = MAP_H * TILE * scale;
  canvas.style.width = canvas.width + 'px';
  canvas.style.height = canvas.height + 'px';
  canvas.style.position = 'fixed';
  canvas.style.left = (vw - canvas.width) / 2 + 'px';
  canvas.style.top = (vh - canvas.height) / 2 + 'px';
  ctx.imageSmoothingEnabled = true;
}
resize();
window.addEventListener('resize', resize);

// ══════════════════════════════════════
// TILE MAP
// ══════════════════════════════════════
// 0=grass, 1=dirt path, 2=soil (plot), 3=water, 4=flowers, 5=fence
const map = [];
for(let y=0;y<MAP_H;y++){
  map[y]=[];
  for(let x=0;x<MAP_W;x++){
    map[y][x] = 0; // default grass
  }
}

// Smooth bezier path waypoints (in tile coords) connecting plots in curriculum order
// These are control points for a smooth spline — NOT tile positions
const PATH_POINTS = [
  {x:0, y:13.5},    // entry from left edge
  {x:2.5, y:12.5},  // near plot 1 (Print Concepts)
  {x:5, y:11},       // bend toward plot 2
  {x:6.5, y:10},    // near plot 2 (Letter Knowledge)
  {x:5, y:8.5},     // swing back left
  {x:3.5, y:7},     // near plot 3 (Rhyme Detection)
  {x:5, y:5},       // curve up
  {x:7.5, y:4},     // near plot 4 (Syllable Counting)
  {x:9, y:4.5},     // right
  {x:11.5, y:5},    // near plot 5 (Alphabetic Principle)
  {x:13, y:6.5},    // down-right
  {x:14.5, y:8},    // near plot 6 (Decoding)
  {x:15.5, y:6},    // up
  {x:17.5, y:4},    // near plot 7 (Encoding)
  {x:19, y:3},      // exit right edge
];

// Sample points along the smooth path for collision / grass-edge detail
function catmullRom(p0,p1,p2,p3,t){
  const t2=t*t, t3=t2*t;
  return {
    x: 0.5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
    y: 0.5*((2*p1.y)+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3)
  };
}

const pathSamples = [];
for(let i=0;i<PATH_POINTS.length-1;i++){
  const p0 = PATH_POINTS[Math.max(0,i-1)];
  const p1 = PATH_POINTS[i];
  const p2 = PATH_POINTS[Math.min(PATH_POINTS.length-1,i+1)];
  const p3 = PATH_POINTS[Math.min(PATH_POINTS.length-1,i+2)];
  for(let t=0;t<1;t+=0.05){
    pathSamples.push(catmullRom(p0,p1,p2,p3,t));
  }
}

// Scatter decorative elements (seeded random for consistency)
function seededRand(seed){ let s=seed; return ()=>{ s=(s*16807)%2147483647; return(s-1)/2147483646; }; }
const decor = [];
const rng = seededRand(42);
for(let i=0;i<60;i++){
  const dx = rng()*MAP_W, dy = rng()*MAP_H;
  // Skip if near path or plot
  const nearPath = pathSamples.some(p=>Math.hypot(p.x-dx,p.y-dy)<1.8);
  const nearPlot = plots.some(p=>dx>=p.x-0.5&&dx<=p.x+p.w+0.5&&dy>=p.y-0.5&&dy<=p.y+p.h+0.5);
  if(nearPath||nearPlot) continue;
  const type = rng()<0.35?'tuft':rng()<0.55?'daisy':rng()<0.7?'mushroom':rng()<0.85?'rock':'bush';
  decor.push({x:dx, y:dy, type, seed:rng()*1000|0});
}

// Water pond (bottom-right, organic shape)
const POND = {cx:17, cy:12, rx:1.8, ry:1.2};

// No tile-based path — path is drawn as smooth spline over grass

// Plot soil
plots.forEach(p=>{
  for(let py=p.y;py<p.y+p.h;py++)
    for(let px=p.x;px<p.x+p.w;px++)
      if(py<MAP_H && px<MAP_W) map[py][px]=2;
});

// ══════════════════════════════════════
// DRAWING HELPERS
// ══════════════════════════════════════
function S(v){ return v * TILE * scale / 32; } // scale helper (relative to 32px base)
function TX(x){ return x * TILE * scale; }
function TY(y){ return y * TILE * scale; }

function ellipse(cx, cy, rx, ry, color){
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2);
  ctx.fill();
}

function roundRect(x, y, w, h, r, color){
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
  ctx.fill();
}

// ══════════════════════════════════════
// AMBIENT PARTICLES
// ══════════════════════════════════════
const leaves = [];
for(let i=0;i<15;i++){
  leaves.push({
    x: Math.random()*MAP_W*TILE, y: Math.random()*MAP_H*TILE,
    vx: Math.random()*0.1+0.02, vy: Math.random()*0.05+0.01,
    rot: Math.random()*Math.PI*2, rotV: (Math.random()-0.5)*0.03,
    size: Math.random()*4+3,
    color: ['#6aaa3a','#89c44a','#f4d35e','#e68a4a','#c0392b'][Math.floor(Math.random()*5)],
    alpha: Math.random()*0.5+0.35,
  });
}

const butterflies = [];
for(let i=0;i<5;i++){
  butterflies.push({
    x: Math.random()*MAP_W*TILE, y: Math.random()*MAP_H*TILE*0.6 + MAP_H*TILE*0.15,
    phase: Math.random()*Math.PI*2, speed: Math.random()*0.08+0.04,
    wingPhase: Math.random()*Math.PI*2,
    color: ['#e84393','#a29bfe','#ffeaa7','#81ecec','#ff7675'][i],
  });
}

// ══════════════════════════════════════
// GROUND DRAWING (illustrated, smooth)
// ══════════════════════════════════════
function drawGround(){
  const cw = canvas.width, ch = canvas.height;

  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, ch*0.3);
  sky.addColorStop(0, '#89d4f5');
  sky.addColorStop(0.6, '#a8e2f8');
  sky.addColorStop(1, '#c5eaf7');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, cw, ch*0.3);

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  [[cw*0.15,ch*0.08,S(40),S(16)],[cw*0.55,ch*0.05,S(55),S(18)],[cw*0.82,ch*0.12,S(35),S(13)]].forEach(([cx,cy,rx,ry])=>{
    ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx-rx*0.4,cy+ry*0.3,rx*0.6,ry*0.7,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+rx*0.35,cy+ry*0.2,rx*0.5,ry*0.65,0,0,Math.PI*2); ctx.fill();
  });

  // Main grass
  const grass = ctx.createLinearGradient(0, ch*0.15, 0, ch);
  grass.addColorStop(0, '#72c84e');
  grass.addColorStop(0.3, '#5aac3a');
  grass.addColorStop(0.7, '#4a9830');
  grass.addColorStop(1, '#3d8a28');
  ctx.fillStyle = grass;
  ctx.fillRect(0, ch*0.15, cw, ch*0.85);

  // Grass texture — subtle darker patches
  for(let i=0;i<30;i++){
    const gx = ((i*137+53)%100)/100*cw;
    const gy = ch*0.2 + ((i*89+31)%80)/100*ch*0.75;
    const gr = S(15+i%10);
    ctx.fillStyle = `rgba(60,120,30,${0.06+i%3*0.02})`;
    ctx.beginPath(); ctx.ellipse(gx,gy,gr,gr*0.6,i*0.5,0,Math.PI*2); ctx.fill();
  }

  // ── SMOOTH DIRT PATH (Catmull-Rom spline) ──
  // Draw thick sandy path with soft edges
  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Outer edge (darker dirt border)
  ctx.strokeStyle = '#a08050';
  ctx.lineWidth = S(52);
  ctx.beginPath();
  drawSmoothPath();
  ctx.stroke();

  // Main path fill
  ctx.strokeStyle = '#c9a86c';
  ctx.lineWidth = S(44);
  ctx.beginPath();
  drawSmoothPath();
  ctx.stroke();

  // Inner highlight (lighter center)
  ctx.strokeStyle = '#d9c08a';
  ctx.lineWidth = S(28);
  ctx.beginPath();
  drawSmoothPath();
  ctx.stroke();

  // Center light streak
  ctx.strokeStyle = 'rgba(230,210,170,0.4)';
  ctx.lineWidth = S(12);
  ctx.beginPath();
  drawSmoothPath();
  ctx.stroke();
  ctx.restore();

  // Pebbles scattered along path
  for(let i=0;i<pathSamples.length;i+=3){
    const p = pathSamples[i];
    const px = TX(p.x), py = TY(p.y);
    const seed = (i*73+17)%100;
    if(seed<30){
      ellipse(px + S(seed%20-10), py + S(seed%14-7), S(3), S(2), 'rgba(139,105,20,0.12)');
    }
    if(seed>70){
      ellipse(px + S(seed%16-8), py + S(seed%12-6), S(2), S(1.5), 'rgba(100,75,30,0.1)');
    }
  }

  // Grass tufts along path edges
  for(let i=0;i<pathSamples.length;i+=4){
    const p = pathSamples[i];
    const px = TX(p.x), py = TY(p.y);
    const seed = (i*47+11)%100;
    const side = seed%2===0? -1:1;
    const ox = side * S(26+seed%8), oy = S(seed%10-5);
    ctx.strokeStyle = `rgba(60,150,40,${0.3+seed%3*0.1})`;
    ctx.lineWidth = S(1.2);
    ctx.beginPath();
    ctx.moveTo(px+ox, py+oy+S(4));
    ctx.quadraticCurveTo(px+ox+S(seed%6-3), py+oy-S(6), px+ox+S(seed%4-2), py+oy-S(10));
    ctx.stroke();
  }

  // ── SOIL PLOTS ──
  plots.forEach(p=>{
    const px = TX(p.x), py = TY(p.y);
    const pw = p.w*TILE*scale, ph = p.h*TILE*scale;
    // Soft rounded soil bed
    const sg = ctx.createLinearGradient(px, py, px, py+ph);
    sg.addColorStop(0, '#6b4226');
    sg.addColorStop(0.5, '#5a3820');
    sg.addColorStop(1, '#4a2e18');
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.roundRect(px+S(2), py+S(2), pw-S(4), ph-S(4), S(8));
    ctx.fill();
    // Raised border
    ctx.strokeStyle = '#7a5030';
    ctx.lineWidth = S(2);
    ctx.beginPath();
    ctx.roundRect(px+S(2), py+S(2), pw-S(4), ph-S(4), S(8));
    ctx.stroke();
    // Furrow lines
    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
    ctx.lineWidth = S(1);
    for(let fy=0;fy<3;fy++){
      const ry = py + ph*0.2 + fy*ph*0.25;
      ctx.beginPath();
      ctx.moveTo(px+S(8), ry);
      ctx.bezierCurveTo(px+pw*0.3, ry+S(2), px+pw*0.7, ry-S(2), px+pw-S(8), ry);
      ctx.stroke();
    }
  });

  // ── POND (organic shape) ──
  const pcx = TX(POND.cx), pcy = TY(POND.cy);
  const prx = POND.rx*TILE*scale, pry = POND.ry*TILE*scale;
  // Dark edge
  ellipse(pcx, pcy+S(4), prx+S(6), pry+S(6), 'rgba(30,80,50,0.3)');
  // Water fill
  const wg = ctx.createRadialGradient(pcx-prx*0.2, pcy-pry*0.2, 0, pcx, pcy, prx);
  wg.addColorStop(0, '#6ec6e8');
  wg.addColorStop(0.6, '#4aa0d0');
  wg.addColorStop(1, '#3580b0');
  ctx.fillStyle = wg;
  ctx.beginPath();
  ctx.ellipse(pcx, pcy, prx, pry, 0, 0, Math.PI*2);
  ctx.fill();
  // Ripples
  const rip = Math.sin(Date.now()/800);
  ctx.strokeStyle = `rgba(255,255,255,${0.15+rip*0.08})`;
  ctx.lineWidth = S(1.5);
  ctx.beginPath();
  ctx.ellipse(pcx+rip*S(3), pcy, prx*0.5, pry*0.4, 0, 0, Math.PI*2);
  ctx.stroke();
  // Lily pad
  ctx.fillStyle = '#3d8a28';
  ctx.beginPath();
  ctx.ellipse(pcx+prx*0.3, pcy-pry*0.2, S(10), S(7), 0.3, 0.2, Math.PI*1.8);
  ctx.fill();

  // ── DECORATIVE ELEMENTS ──
  decor.forEach(d=>{
    const dx = TX(d.x), dy = TY(d.y);
    if(d.type==='tuft'){
      // Grass tuft
      for(let b=0;b<3;b++){
        const bx = dx+S(b*5-5), bbase = dy+S(4);
        ctx.strokeStyle = ['#4a9830','#5aac3a','#3d8a28'][b];
        ctx.lineWidth = S(1.5);
        ctx.beginPath();
        ctx.moveTo(bx, bbase);
        ctx.quadraticCurveTo(bx+S(b*2-2), bbase-S(12+d.seed%5), bx+S(b-1), bbase-S(16+d.seed%4));
        ctx.stroke();
      }
    } else if(d.type==='daisy'){
      // Small daisy
      ctx.strokeStyle = '#2d8a4e';
      ctx.lineWidth = S(1.5);
      ctx.beginPath(); ctx.moveTo(dx, dy+S(8)); ctx.quadraticCurveTo(dx+S(1), dy+S(3), dx, dy); ctx.stroke();
      const pc = ['#fff','#ffeaa7','#fd79a8','#a29bfe'][d.seed%4];
      for(let p=0;p<5;p++){
        const a = (p/5)*Math.PI*2;
        ellipse(dx+Math.cos(a)*S(3.5), dy+Math.sin(a)*S(3.5), S(2.5), S(2), pc);
      }
      ellipse(dx, dy, S(2.5), S(2.5), '#ffe44d');
    } else if(d.type==='mushroom'){
      // Small mushroom
      roundRect(dx-S(1.5), dy, S(3), S(6), S(1), '#e8d5a8');
      ellipse(dx, dy, S(6), S(4), ['#e74c3c','#e67e22','#8e44ad'][d.seed%3]);
      ellipse(dx-S(2), dy-S(1), S(1.5), S(1.5), 'rgba(255,255,255,0.5)');
      ellipse(dx+S(2.5), dy+S(0.5), S(1), S(1), 'rgba(255,255,255,0.4)');
    } else if(d.type==='rock'){
      // Small rock
      ellipse(dx, dy+S(2), S(7), S(4), '#8e8e8e');
      ellipse(dx-S(1), dy+S(1), S(6), S(3.5), '#a0a0a0');
      ellipse(dx-S(2), dy, S(2), S(1.5), 'rgba(255,255,255,0.15)');
    } else if(d.type==='bush'){
      // Bush
      ellipse(dx, dy+S(2), S(12), S(8), '#3d8a28');
      ellipse(dx-S(3), dy-S(2), S(9), S(7), '#4a9830');
      ellipse(dx+S(4), dy-S(1), S(8), S(6), '#5aac3a');
      ellipse(dx-S(1), dy-S(5), S(5), S(3.5), 'rgba(120,200,80,0.4)');
    }
  });
}

// Draw the smooth Catmull-Rom path curve
function drawSmoothPath(){
  const pts = PATH_POINTS;
  for(let i=0;i<pts.length-1;i++){
    const p0 = pts[Math.max(0,i-1)];
    const p1 = pts[i];
    const p2 = pts[Math.min(pts.length-1,i+1)];
    const p3 = pts[Math.min(pts.length-1,i+2)];
    for(let t=0;t<=1;t+=0.02){
      const pt = catmullRom(p0,p1,p2,p3,t);
      const px = TX(pt.x), py = TY(pt.y);
      if(t===0 && i===0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
  }
}

// ══════════════════════════════════════
// PLANT DRAWING (PvZ-style illustrated)
// ══════════════════════════════════════
function drawPlant(plot){
  const cx = TX(plot.x + plot.w/2);
  const by = TY(plot.y + plot.h) - S(4);
  if(plot.stage === 0) return;

  const sway = Math.sin(Date.now()/1200 + plot.x*2) * S(2);

  // Stage 1: Seed mound
  if(plot.stage >= 1){
    ellipse(cx, by, S(12), S(5), '#8b6914');
    ellipse(cx, by-S(2), S(8), S(3), '#a07a20');
    // Tiny crack
    if(plot.stage === 1){
      ctx.strokeStyle = '#5a3e1b';
      ctx.lineWidth = S(1);
      ctx.beginPath(); ctx.moveTo(cx-S(2), by-S(3)); ctx.lineTo(cx+S(1), by-S(6)); ctx.stroke();
    }
  }

  // Stage 2: Sprout
  if(plot.stage >= 2){
    // Stem
    ctx.strokeStyle = '#2d8a4e';
    ctx.lineWidth = S(3);
    ctx.beginPath();
    ctx.moveTo(cx, by);
    ctx.quadraticCurveTo(cx+sway, by-S(20), cx+sway*0.5, by-S(35));
    ctx.stroke();
    // Leaves
    const lx = cx + sway*0.7, ly = by - S(22);
    ctx.fillStyle = '#5aac3a';
    ctx.beginPath();
    ctx.ellipse(lx-S(12), ly, S(10), S(5), -0.4, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#4e9c32';
    ctx.beginPath();
    ctx.ellipse(lx+S(10), ly-S(4), S(9), S(4.5), 0.3, 0, Math.PI*2);
    ctx.fill();
    // Leaf veins
    ctx.strokeStyle = 'rgba(30,100,50,0.3)';
    ctx.lineWidth = S(0.8);
    ctx.beginPath(); ctx.moveTo(lx-S(6), ly); ctx.lineTo(lx-S(18), ly+S(1)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(lx+S(5), ly-S(4)); ctx.lineTo(lx+S(16), ly-S(3)); ctx.stroke();
  }

  // Stage 3: Full plant
  if(plot.stage >= 3){
    const topX = cx + sway*0.5, topY = by - S(55);
    // Thicker stem
    ctx.strokeStyle = '#2d8a4e';
    ctx.lineWidth = S(4.5);
    ctx.beginPath();
    ctx.moveTo(cx, by);
    ctx.bezierCurveTo(cx+sway, by-S(20), cx+sway*0.8, by-S(40), topX, topY);
    ctx.stroke();
    // Canopy / head
    ellipse(topX, topY, S(22), S(18), plot.color);
    ellipse(topX-S(5), topY-S(4), S(16), S(13), lighten(plot.color, 20));
    // Highlight
    ellipse(topX-S(8), topY-S(8), S(6), S(4), 'rgba(255,255,255,0.2)');
    // Extra leaves on stem
    ctx.fillStyle = '#5aac3a';
    ctx.beginPath();
    ctx.ellipse(cx+sway*0.6-S(10), by-S(35), S(8), S(4), -0.5, 0, Math.PI*2);
    ctx.fill();
  }

  // Stage 4: Bloom
  if(plot.stage >= 4){
    const topX = cx + sway*0.5, topY = by - S(55);
    // Flower petals around the canopy
    const petalColors = ['#ffe44d','#ffb347','#ff6b6b','#a29bfe','#fd79a8'];
    for(let p=0;p<6;p++){
      const ang = (p/6)*Math.PI*2 + Date.now()/3000;
      const px = topX + Math.cos(ang)*S(18);
      const py = topY + Math.sin(ang)*S(14);
      ellipse(px, py, S(7), S(6), petalColors[p%5]);
    }
    // Center
    ellipse(topX, topY, S(8), S(7), '#ffe44d');
    ellipse(topX-S(2), topY-S(2), S(3), S(2.5), 'rgba(255,255,255,0.35)');
    // Side buds
    ellipse(cx+sway*0.6-S(14), by-S(38), S(6), S(5), '#ffe44d');
    ellipse(cx+sway*0.6+S(16), by-S(42), S(5), S(4.5), petalColors[2]);
  }

  // Stage 5: Harvested / golden glow
  if(plot.stage >= 5){
    const topX = cx + sway*0.5, topY = by - S(55);
    // Golden aura
    const glow = ctx.createRadialGradient(topX, topY, 0, topX, topY, S(40));
    glow.addColorStop(0, 'rgba(255,228,77,0.3)');
    glow.addColorStop(1, 'rgba(255,228,77,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(topX-S(45), topY-S(45), S(90), S(90));
    // Sparkles
    const t = Date.now()/300;
    for(let sp=0;sp<4;sp++){
      const sx2 = topX + Math.sin(t+sp*1.7)*S(25);
      const sy2 = topY + Math.cos(t*0.8+sp*2.3)*S(20);
      const sa = (Math.sin(t*2+sp*3)*0.5+0.5)*0.8;
      ctx.globalAlpha = sa;
      drawStar(sx2, sy2, S(3), '#fff');
      ctx.globalAlpha = 1;
    }
  }
}

function drawStar(cx, cy, r, color){
  ctx.fillStyle = color;
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const a = (i/5)*Math.PI*2 - Math.PI/2;
    const x1 = cx + Math.cos(a)*r;
    const y1 = cy + Math.sin(a)*r;
    const a2 = a + Math.PI/5;
    const x2 = cx + Math.cos(a2)*r*0.4;
    const y2 = cy + Math.sin(a2)*r*0.4;
    if(i===0) ctx.moveTo(x1,y1); else ctx.lineTo(x1,y1);
    ctx.lineTo(x2,y2);
  }
  ctx.closePath();
  ctx.fill();
}

function lighten(hex, pct){
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  const f = pct/100;
  return `rgb(${Math.min(255,r+f*255|0)},${Math.min(255,g+f*255|0)},${Math.min(255,b+f*255|0)})`;
}

// ══════════════════════════════════════
function drawLeaves(){
  leaves.forEach(l => {
    l.x += l.vx; l.y += l.vy; l.rot += l.rotV;
    if(l.x > MAP_W*TILE+10) l.x = -10;
    if(l.y > MAP_H*TILE+10){ l.y = -10; l.x = Math.random()*MAP_W*TILE; }
    ctx.save();
    ctx.translate(l.x*scale, l.y*scale);
    ctx.rotate(l.rot);
    ctx.globalAlpha = l.alpha;
    // Leaf shape
    ctx.fillStyle = l.color;
    ctx.beginPath();
    ctx.ellipse(0, 0, l.size*scale, l.size*scale*0.5, 0, 0, Math.PI*2);
    ctx.fill();
    // Vein
    ctx.strokeStyle = 'rgba(0,0,0,0.12)';
    ctx.lineWidth = 0.5*scale;
    ctx.beginPath(); ctx.moveTo(-l.size*scale, 0); ctx.lineTo(l.size*scale, 0); ctx.stroke();
    ctx.restore();
    ctx.globalAlpha = 1;
  });
}

function drawButterflies(){
  butterflies.forEach(b => {
    b.phase += 0.004; b.wingPhase += 0.08;
    b.x += Math.sin(b.phase) * b.speed;
    b.y += Math.cos(b.phase*0.7) * b.speed * 0.3;
    if(b.x > MAP_W*TILE+20) b.x = -20;
    if(b.x < -20) b.x = MAP_W*TILE+20;
    const bx = b.x*scale, by2 = b.y*scale;
    const wing = Math.sin(b.wingPhase);
    const ws = S(8);
    // Wings
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.ellipse(bx-ws*0.8, by2, ws*Math.abs(wing)*0.8+S(2), ws*0.7, -0.2, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(bx+ws*0.8, by2, ws*Math.abs(wing)*0.8+S(2), ws*0.7, 0.2, 0, Math.PI*2);
    ctx.fill();
    // Wing spots
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath(); ctx.ellipse(bx-ws*0.6, by2, S(2), S(2), 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(bx+ws*0.6, by2, S(2), S(2), 0, 0, Math.PI*2); ctx.fill();
    // Body
    ellipse(bx, by2, S(1.5), S(4), '#2d1b0e');
    // Antennae
    ctx.strokeStyle = '#2d1b0e';
    ctx.lineWidth = S(0.6);
    ctx.beginPath(); ctx.moveTo(bx, by2-S(3)); ctx.quadraticCurveTo(bx-S(4), by2-S(8), bx-S(5), by2-S(10)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx, by2-S(3)); ctx.quadraticCurveTo(bx+S(4), by2-S(8), bx+S(5), by2-S(10)); ctx.stroke();
  });
}

// ══════════════════════════════════════
// PLAYER MOVEMENT
// ══════════════════════════════════════
let keys = {};
document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Tap to move
canvas.addEventListener('pointerdown', e => {
  const rect = canvas.getBoundingClientRect();
  const tx = (e.clientX - rect.left) / scale / TILE;
  const ty = (e.clientY - rect.top) / scale / TILE;
  targetX = tx - 0.5;
  targetY = ty - 0.5;
});

function updatePlayer(dt){
  let dx = 0, dy = 0;

  // Keyboard
  if(keys['ArrowLeft'] || keys['a']) dx -= 1;
  if(keys['ArrowRight']|| keys['d']) dx += 1;
  if(keys['ArrowUp']   || keys['w']) dy -= 1;
  if(keys['ArrowDown'] || keys['s']) dy += 1;

  // Tap target
  if(targetX !== null){
    const diffX = targetX - player.x;
    const diffY = targetY - player.y;
    if(Math.abs(diffX) > 0.3) dx += Math.sign(diffX);
    if(Math.abs(diffY) > 0.3) dy += Math.sign(diffY);
    if(Math.abs(diffX) < 0.3 && Math.abs(diffY) < 0.3){
      targetX = null; targetY = null;
    }
  }

  // Normalize diagonal
  if(dx && dy){ dx *= 0.707; dy *= 0.707; }

  player.moving = dx !== 0 || dy !== 0;

  const nx = player.x + dx * PLAYER_SPEED * dt;
  const ny = player.y + dy * PLAYER_SPEED * dt;

  // Bounds
  if(nx >= 0.5 && nx <= MAP_W - 1.5) player.x = nx;
  if(ny >= 0.5 && ny <= MAP_H - 1.5) player.y = ny;

  // Check proximity to plots / shop
  checkProximity();
}

// ══════════════════════════════════════
// PROXIMITY & INTERACTION
// ══════════════════════════════════════
let activePrompt = null;
const promptEl = document.getElementById('prompt');

function checkProximity(){
  let found = null;

  // Check plots
  for(const p of plots){
    const cx = p.x + p.w/2, cy = p.y + p.h/2;
    const dist = Math.hypot(player.x - cx, player.y - cy);
    if(dist < 2.5){
      found = { type:'plot', plot:p };
      break;
    }
  }

  // Check shop
  if(!found){
    const sx = SHOP.x + SHOP.w/2, sy = SHOP.y + SHOP.h/2;
    if(Math.hypot(player.x - sx, player.y - sy) < 2.8){
      found = { type:'shop' };
    }
  }

  if(found && found.type === 'plot'){
    const p = found.plot;
    const stageNames = ['Empty','Seed','Sprout','Growing','Blooming','Harvested'];
    showPrompt(
      `${p.icon} ${p.plant}`,
      `${p.domain}<br>Stage: ${stageNames[p.stage]} (${p.stage}/${p.maxStage})`,
      p.stage < p.maxStage ? 'Play' : null,
      () => launchGame(p),
      p.x + p.w/2,
      p.y
    );
  } else if(found && found.type === 'shop'){
    showPrompt('🏪 Garden Shop', 'Browse upgrades for your garden.', 'Open Shop', openShop,
      SHOP.x + SHOP.w/2, SHOP.y);
  } else {
    hidePrompt();
  }
}

// Convert tile coords to screen coords (accounting for canvas position)
function tileToScreen(tx, ty){
  const rect = canvas.getBoundingClientRect();
  return {
    x: rect.left + tx * TILE * scale,
    y: rect.top + ty * TILE * scale
  };
}

function showPrompt(title, body, btnText, btnAction, tileX, tileY){
  const key = title + body;
  if(activePrompt === key){
    // Still update position even if content unchanged
    positionPrompt(tileX, tileY);
    return;
  }
  activePrompt = key;

  document.getElementById('prompt-title').innerHTML = title;
  document.getElementById('prompt-body').innerHTML = body;
  const actionEl = document.getElementById('prompt-action');
  if(btnText){
    actionEl.innerHTML = `<button class="prompt-btn" id="prompt-go">${btnText}</button>`;
    document.getElementById('prompt-go').addEventListener('pointerdown', e => {
      e.stopPropagation();
      if(btnAction) btnAction();
    });
  } else {
    actionEl.innerHTML = '<span style="font-size:8px;color:#7cfc00">✓ Mastered!</span>';
  }
  positionPrompt(tileX, tileY);
  promptEl.classList.add('show');
}

function positionPrompt(tileX, tileY){
  const pos = tileToScreen(tileX, tileY);
  const vw = window.innerWidth, vh = window.innerHeight;
  // Place above the plot; if too high, place below
  let top = pos.y - S(60);
  if(top < 10) top = pos.y + S(40);
  let left = pos.x;
  // Clamp to viewport
  promptEl.style.left = Math.max(10, Math.min(vw - 10, left)) + 'px';
  promptEl.style.top = Math.max(10, Math.min(vh - 80, top)) + 'px';
}

function hidePrompt(){
  if(!activePrompt) return;
  activePrompt = null;
  promptEl.classList.remove('show');
}

// ══════════════════════════════════════
// LAUNCH GAME
// ══════════════════════════════════════
function launchGame(plot){
  // Map plot IDs to game files
  const gameMap = {
    'phonol':   'game-03-whispering-stones.html',
    'letter':   'game-05-seed-script.html',
    'syllable': 'game-06-syllable-sprout.html',
    // 'print': coming soon
    // 'alpha': coming soon
    // 'decode': coming soon
    // 'encode': coming soon
  };
  const file = gameMap[plot.id];
  if(file){
    sessionStorage.setItem('fromGarden','1');
    window.location.href = file;
  } else {
    showPrompt(
      `${plot.icon} ${plot.plant}`,
      'Coming soon!<br>This mini-game is still being built.',
      null, null
    );
  }
}

// ══════════════════════════════════════
// SHOP
// ══════════════════════════════════════
function openShop(){
  const overlay = document.getElementById('shop-overlay');
  overlay.classList.remove('off');
  renderShopItems();
}

function closeShop(){
  document.getElementById('shop-overlay').classList.add('off');
}

function renderShopItems(){
  const container = document.getElementById('shop-items');
  container.innerHTML = '';
  SHOP_ITEMS.forEach((item, i) => {
    const canAfford = item.currency === 'seeds' ? seeds >= item.cost : sunshine >= item.cost;
    const div = document.createElement('div');
    div.className = 'shop-item' + (item.bought ? ' bought' : '');
    div.innerHTML = `
      <div class="shop-icon">${item.icon}</div>
      <div class="shop-info">
        <div class="shop-name">${item.name}</div>
        <div class="shop-desc">${item.desc}</div>
      </div>
      <div class="shop-cost">${item.cost} ${item.currency === 'seeds' ? '🌱' : '☀️'}</div>
    `;
    if(!item.bought && canAfford){
      div.addEventListener('click', () => buyItem(i));
    }
    container.appendChild(div);
  });
}

function buyItem(idx){
  const item = SHOP_ITEMS[idx];
  if(item.bought) return;
  if(item.currency === 'seeds'){
    if(seeds < item.cost) return;
    seeds -= item.cost;
  } else {
    if(sunshine < item.cost) return;
    sunshine -= item.cost;
  }
  item.bought = true;
  updateHUD();
  renderShopItems();
}

document.getElementById('shop-close').addEventListener('click', closeShop);
document.getElementById('shop-btn').addEventListener('pointerdown', e => {
  e.stopPropagation();
  openShop();
});
document.getElementById('shop-overlay').addEventListener('pointerdown', e => {
  if(e.target === document.getElementById('shop-overlay')) closeShop();
});

// ══════════════════════════════════════
// HUD
// ══════════════════════════════════════
function updateHUD(){
  document.getElementById('seeds-val').textContent = seeds;
  document.getElementById('sun-val').textContent = sunshine;
}
updateHUD();

// ══════════════════════════════════════
// GAME LOOP
// ══════════════════════════════════════
let lastTime = 0;
function gameLoop(time){
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;
  updatePlayer(dt);
  draw();
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
