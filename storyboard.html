<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OL Prototypes — Game Storyboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f3f0;overflow:hidden;font-family:'Inter',sans-serif;height:100vh;width:100vw;color:#2a2a3a}

/* Toolbar */
#toolbar{position:fixed;top:0;left:0;right:0;height:48px;z-index:100;
  background:rgba(255,255,255,0.95);border-bottom:1px solid #e0ddd8;
  display:flex;align-items:center;padding:0 16px;gap:16px;backdrop-filter:blur(8px)}
#toolbar h1{font-size:14px;font-weight:700;color:#6d5cae;letter-spacing:1px}
.tb-sep{width:1px;height:24px;background:#e0ddd8}
.tb-btn{background:#fff;border:1px solid #d8d5d0;
  border-radius:6px;padding:6px 12px;font-size:11px;font-weight:600;color:#6a6a7a;
  cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif}
.tb-btn:hover{background:#f0eef8;color:#5a4a9a;border-color:#c0bcd0}
#zoom-label{font-size:11px;color:#8a8a9a;min-width:50px;text-align:center}
.tb-help{font-size:10px;color:#aaa;margin-left:auto}

/* Canvas area */
#viewport{position:fixed;top:48px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab;
  background:#f5f3f0;
  background-image:radial-gradient(circle,#e8e5e0 1px,transparent 1px);
  background-size:24px 24px}
#viewport:active{cursor:grabbing}
#board{position:absolute;transform-origin:0 0;will-change:transform}

/* Domain cards */
.domain{
  position:absolute;width:260px;
  background:#fff;border:2px solid var(--domain-color,#ccc);
  border-radius:14px;padding:20px;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
  transition:box-shadow .2s;user-select:none}
.domain:hover{box-shadow:0 4px 16px rgba(0,0,0,0.1)}
.domain-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.domain-num{width:28px;height:28px;border-radius:50%;background:var(--domain-color,#ccc);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff}
.domain-title{font-size:14px;font-weight:700;color:#2a2a3a}
.domain-sub{font-size:11px;color:#7a7a8a;line-height:1.5;margin-bottom:10px}
.domain-meta{font-size:10px;color:#9a9aa0;display:flex;gap:8px}
.domain-tag{background:#f5f3f0;padding:2px 8px;border-radius:10px;color:#7a7a8a}
.domain-expand{font-size:10px;color:var(--domain-color,#999);margin-top:10px;
  font-weight:600;letter-spacing:1px;text-transform:uppercase}

/* Lesson cards */
.lesson{
  position:absolute;width:220px;
  background:#fff;border:2px solid #e8e5e0;
  border-radius:12px;padding:14px;cursor:pointer;
  box-shadow:0 1px 4px rgba(0,0,0,0.04);
  transition:all .25s;user-select:none;opacity:0;transform:translateY(8px)}
.lesson.show{opacity:1;transform:translateY(0)}
.lesson:hover{border-color:var(--domain-color,#ccc);box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.lesson-title{font-size:12px;font-weight:700;color:#2a2a3a;margin-bottom:4px}
.lesson-desc{font-size:10px;color:#8a8a9a;line-height:1.5;margin-bottom:8px}
.lesson-status{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  padding:2px 8px;border-radius:8px;display:inline-block}
.status-concept{background:#f0eef8;color:#8b7ac0}
.status-built{background:#e8f5ed;color:#4a9a6a}
.status-planned{background:#fef5e0;color:#b89030}
.lesson-expand{font-size:9px;color:#aaa;margin-top:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase}

/* Phase cards */
.phase{
  position:absolute;width:180px;
  background:#fff;border:2px solid #eeebe8;
  border-radius:10px;padding:12px;
  box-shadow:0 1px 4px rgba(0,0,0,0.03);
  transition:all .25s;opacity:0;transform:scale(0.95);user-select:none}
.phase.show{opacity:1;transform:scale(1)}
.phase-label{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.phase-teach{color:#7c6bb5}
.phase-guided{color:#c89030}
.phase-sprint{color:#4a9a6a}
.phase-wrapup{color:#4a8ab5}
.phase-title{font-size:11px;font-weight:600;color:#3a3a4a;margin-bottom:4px}
.phase-desc{font-size:9px;color:#8a8a9a;line-height:1.5}
.phase-game{font-size:10px;color:#6d5cae;margin-top:6px;font-weight:600}
.phase-notes{width:100%;margin-top:8px;background:#faf9f8;
  border:1px solid #e8e5e0;border-radius:6px;padding:6px 8px;
  font-size:9px;color:#6a6a7a;font-family:'Inter',sans-serif;resize:vertical;min-height:32px;
  outline:none}
.phase-notes:focus{border-color:#b0a8d0;color:#3a3a4a}
.phase-notes::placeholder{color:#c0c0c8}

/* Connectors */
#connectors{position:absolute;top:0;left:0;pointer-events:none;z-index:-1}
.connector-domain{stroke:#d0cdc8;stroke-width:2;fill:none;stroke-dasharray:8 4}
.connector-lesson{stroke:#e0ddd8;stroke-width:1.5;fill:none}

/* Minimap */
#minimap{position:fixed;bottom:16px;right:16px;width:200px;height:110px;
  background:rgba(255,255,255,0.95);border:1px solid #e0ddd8;border-radius:10px;
  z-index:100;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
#minimap-view{position:absolute;border:2px solid #6d5cae;background:rgba(109,92,174,0.06);
  border-radius:2px;pointer-events:none}
.mm-domain{position:absolute;border-radius:2px}
</style>
</head>
<body>

<div id="toolbar">
  <h1>Game Storyboard</h1>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="zoomIn()">Zoom +</button>
  <button class="tb-btn" onclick="zoomOut()">Zoom −</button>
  <button class="tb-btn" onclick="resetView()">Reset</button>
  <span id="zoom-label">85%</span>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="collapseAll()">Collapse All</button>
  <button class="tb-btn" onclick="expandAll()">Expand All</button>
  <span class="tb-help">Scroll to zoom · Drag to pan · Click cards to expand</span>
</div>

<div id="viewport">
  <svg id="connectors" width="12000" height="8000"></svg>
  <div id="board"></div>
</div>

<div id="minimap"></div>

// ══════════════════════════════════════
// LAYOUT — dynamic, avoids overlap
// ══════════════════════════════════════
const DOMAIN_X_START = 80;
const DOMAIN_Y_START = 80;
const DOMAIN_H_MIN = 160; // minimum domain card height
const DOMAIN_V_GAP = 40;  // vertical gap between domains
const LESSON_X_OFFSET = 300; // lessons are to the RIGHT of domain
const LESSON_V_GAP = 16;
const LESSON_H = 130; // approximate lesson card height
const PHASE_X_OFFSET = 260; // phases to the right of lesson
const PHASE_H_GAP = 16;
const PHASE_H = 200; // approximate phase card height

const board = document.getElementById('board');
const svg = document.getElementById('connectors');
let expanded = {};
let lessonExpanded = {};

function calcDomainHeight(d) {
  if (!expanded[d.id]) return DOMAIN_H_MIN;
  let h = 0;
  d.lessons.forEach((l, li) => {
    const lkey = d.id + '-' + li;
    if (lessonExpanded[lkey]) {
      // Lesson with phases: height = max of (lesson card, 4 phases stacked or side-by-side)
      h += Math.max(LESSON_H, l.phases.length * (PHASE_H + PHASE_H_GAP)) + LESSON_V_GAP;
    } else {
      h += LESSON_H + LESSON_V_GAP;
    }
  });
  return Math.max(DOMAIN_H_MIN, h + 40);
}

function render() {
  board.innerHTML = '';
  svg.innerHTML = '';

  let curY = DOMAIN_Y_START;

  DOMAINS.forEach((d, di) => {
    const dx = DOMAIN_X_START;
    const dy = curY;
    const domainH = calcDomainHeight(d);

    // Domain card
    const el = document.createElement('div');
    el.className = 'domain';
    el.style.cssText = `left:${dx}px;top:${dy}px;--domain-color:${d.color}`;
    el.innerHTML = `
      <div class="domain-header">
        <div class="domain-num">${d.num}</div>
        <div class="domain-title">${d.title}</div>
      </div>
      <div class="domain-sub">${d.sub}</div>
      <div class="domain-meta">
        <span class="domain-tag">${d.lessons.length} lessons</span>
        <span class="domain-tag">${d.lessons.filter(l=>l.status==='built').length} built</span>
      </div>
      <div class="domain-expand">${expanded[d.id] ? '▾ Collapse' : '▸ Expand lessons'}</div>
    `;
    el.onclick = (e) => { e.stopPropagation(); toggleDomain(d.id); };
    board.appendChild(el);

    // Domain connector to next
    if (di < DOMAINS.length - 1) {
      const nextY = curY + domainH + DOMAIN_V_GAP;
      addLine(dx + 130, dy + DOMAIN_H_MIN, dx + 130, nextY, 'connector-domain');
    }

    // Lessons
    if (expanded[d.id]) {
      let lessonY = dy + 10;
      d.lessons.forEach((l, li) => {
        const lx = dx + LESSON_X_OFFSET;
        const ly = lessonY;
        const lkey = d.id + '-' + li;

        // Connector domain → lesson
        addLine(dx + 260, dy + 80, lx, ly + 40, 'connector-lesson');

        const lel = document.createElement('div');
        lel.className = 'lesson show';
        lel.style.cssText = `left:${lx}px;top:${ly}px;--domain-color:${d.color};transition-delay:${li * 50}ms`;
        const statusClass = l.status === 'built' ? 'status-built' : l.status === 'planned' ? 'status-planned' : 'status-concept';
        lel.innerHTML = `
          <div class="lesson-title">${l.title}</div>
          <div class="lesson-desc">${l.desc}</div>
          <span class="lesson-status ${statusClass}">${l.status}</span>
          <div class="lesson-expand">${lessonExpanded[lkey] ? '▾ Collapse phases' : '▸ Show phases'}</div>
        `;
        lel.onclick = (e) => { e.stopPropagation(); toggleLesson(lkey); };
        board.appendChild(lel);

        // Phases
        if (lessonExpanded[lkey]) {
          l.phases.forEach((p, pi) => {
            const px = lx + PHASE_X_OFFSET;
            const py = ly + pi * (PHASE_H + PHASE_H_GAP);

            // Connector lesson → first phase
            if (pi === 0) addLine(lx + 220, ly + 50, px, py + 30, 'connector-lesson');
            // Connector between phases
            if (pi > 0) {
              const prevPy = ly + (pi - 1) * (PHASE_H + PHASE_H_GAP);
              addLine(px + 90, prevPy + PHASE_H, px + 90, py, 'connector-lesson');
            }

            const pel = document.createElement('div');
            pel.className = 'phase show';
            pel.style.cssText = `left:${px}px;top:${py}px;transition-delay:${pi * 60}ms`;
            const typeLabel = {teach:'Teach',guided:'Guided',sprint:'Sprint',wrapup:'Wrap-up'}[p.type];
            const typeClass = 'phase-' + p.type;
            pel.innerHTML = `
              <div class="phase-label ${typeClass}">${typeLabel}</div>
              <div class="phase-title">${p.title}</div>
              <div class="phase-desc">${p.desc}</div>
              ${p.game ? `<div class="phase-game">🎮 ${p.game}</div>` : ''}
              <textarea class="phase-notes" placeholder="Add notes…" onclick="event.stopPropagation()">${p.notes || ''}</textarea>
            `;
            pel.querySelector('.phase-notes').addEventListener('input', function(){ p.notes = this.value; });
            board.appendChild(pel);
          });

          // Advance lessonY by the total phase height
          lessonY += l.phases.length * (PHASE_H + PHASE_H_GAP) + LESSON_V_GAP;
        } else {
          lessonY += LESSON_H + LESSON_V_GAP;
        }
      });
    }

    curY += domainH + DOMAIN_V_GAP;
  });

  updateMinimap();
}

function addLine(x1, y1, x2, y2, cls) {
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  const my = (y1 + y2) / 2;
  line.setAttribute('d', `M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`);
  line.setAttribute('class', cls || 'connector-lesson');
  svg.appendChild(line);
}

function toggleDomain(id) {
  expanded[id] = !expanded[id];
  if (!expanded[id]) {
    Object.keys(lessonExpanded).forEach(k => { if (k.startsWith(id)) delete lessonExpanded[k]; });
  }
  render();
}

function toggleLesson(key) {
  lessonExpanded[key] = !lessonExpanded[key];
  render();
}

function collapseAll() { expanded = {}; lessonExpanded = {}; render(); }
function expandAll() {
  DOMAINS.forEach(d => {
    expanded[d.id] = true;
    d.lessons.forEach((_, li) => { lessonExpanded[d.id + '-' + li] = true; });
  });
  render();
}

// ══════════════════════════════════════
// PAN & ZOOM — gentler
// ══════════════════════════════════════
let panX = 0, panY = 0, zoom = 0.85;
let dragging = false, dragSX = 0, dragSY = 0, panSX = 0, panSY = 0;
const viewport = document.getElementById('viewport');

function applyTransform() {
  board.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
  svg.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
  document.getElementById('zoom-label').textContent = Math.round(zoom * 100) + '%';
  updateMinimap();
}

viewport.addEventListener('pointerdown', e => {
  if (e.target === viewport || e.target === svg) {
    dragging = true; dragSX = e.clientX; dragSY = e.clientY; panSX = panX; panSY = panY;
  }
});
window.addEventListener('pointermove', e => {
  if (!dragging) return;
  panX = panSX + (e.clientX - dragSX); panY = panSY + (e.clientY - dragSY);
  applyTransform();
});
window.addEventListener('pointerup', () => { dragging = false; });

viewport.addEventListener('wheel', e => {
  e.preventDefault();
  // Gentler zoom: 3% per scroll tick
  const delta = e.deltaY > 0 ? 0.97 : 1.03;
  const newZoom = Math.max(0.2, Math.min(2.5, zoom * delta));
  const rect = viewport.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  panX = mx - (mx - panX) * (newZoom / zoom);
  panY = my - (my - panY) * (newZoom / zoom);
  zoom = newZoom;
  applyTransform();
}, { passive: false });

function zoomIn() { zoom = Math.min(2.5, zoom * 1.08); applyTransform(); }
function zoomOut() { zoom = Math.max(0.2, zoom * 0.92); applyTransform(); }
function resetView() { panX = 20; panY = 0; zoom = 0.85; applyTransform(); }

// ══════════════════════════════════════
// MINIMAP
// ══════════════════════════════════════
function updateMinimap() {
  const mm = document.getElementById('minimap');
  const mmW = 200, mmH = 110;
  // Estimate total board size
  let totalH = DOMAIN_Y_START;
  DOMAINS.forEach(d => { totalH += calcDomainHeight(d) + DOMAIN_V_GAP; });
  const totalW = DOMAIN_X_START + LESSON_X_OFFSET + PHASE_X_OFFSET + 200;
  const s = Math.min(mmW / totalW, mmH / totalH);

  let dotsHtml = '';
  let cy = DOMAIN_Y_START;
  DOMAINS.forEach((d, i) => {
    const h = calcDomainHeight(d);
    const x = DOMAIN_X_START * s;
    const y = cy * s;
    dotsHtml += `<div class="mm-domain" style="left:${x}px;top:${y}px;width:${260*s}px;height:${Math.min(h,160)*s}px;background:${d.color}22;border:1px solid ${d.color}55;border-radius:2px"></div>`;
    cy += h + DOMAIN_V_GAP;
  });

  const rect = viewport.getBoundingClientRect();
  const vx = (-panX / zoom) * s;
  const vy = (-panY / zoom) * s;
  const vw = (rect.width / zoom) * s;
  const vh = (rect.height / zoom) * s;

  mm.innerHTML = dotsHtml + `<div id="minimap-view" style="left:${vx}px;top:${vy}px;width:${vw}px;height:${vh}px"></div>`;
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
render();
applyTransform();
</script>
