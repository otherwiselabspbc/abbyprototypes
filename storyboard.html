<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OL Prototypes — Game Storyboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f3f0;overflow:hidden;font-family:'Inter',sans-serif;height:100vh;width:100vw;color:#2a2a3a}

#toolbar{position:fixed;top:0;left:0;right:0;height:48px;z-index:100;
  background:rgba(255,255,255,0.95);border-bottom:1px solid #e0ddd8;
  display:flex;align-items:center;padding:0 16px;gap:12px;backdrop-filter:blur(8px)}
#toolbar h1{font-size:14px;font-weight:700;color:#6d5cae;letter-spacing:1px}
.tb-sep{width:1px;height:24px;background:#e0ddd8}
.tb-btn{background:#fff;border:1px solid #d8d5d0;border-radius:6px;padding:6px 12px;
  font-size:11px;font-weight:600;color:#6a6a7a;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.tb-btn:hover{background:#f0eef8;color:#5a4a9a;border-color:#c0bcd0}
#zoom-label{font-size:11px;color:#8a8a9a;min-width:44px;text-align:center}
.tb-help{font-size:10px;color:#aaa;margin-left:auto}

#viewport{position:fixed;top:48px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab;
  background:#f5f3f0;background-image:radial-gradient(circle,#e8e5e0 1px,transparent 1px);background-size:24px 24px}
#viewport:active{cursor:grabbing}
#board{position:absolute;transform-origin:0 0;will-change:transform}
#connectors{position:absolute;top:0;left:0;pointer-events:none;z-index:-1}
.connector-domain{stroke:#d0cdc8;stroke-width:2;fill:none;stroke-dasharray:8 4}
.connector-lesson{stroke:#e0ddd8;stroke-width:1.5;fill:none}

/* Domain */
.domain{position:absolute;width:260px;background:#fff;border:2px solid var(--c,#ccc);
  border-radius:14px;padding:20px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.06);user-select:none}
.domain:hover{box-shadow:0 4px 16px rgba(0,0,0,0.1)}
.d-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.d-num{width:28px;height:28px;border-radius:50%;background:var(--c,#ccc);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff}
.d-title{font-size:14px;font-weight:700}
.d-sub{font-size:11px;color:#7a7a8a;line-height:1.5;margin-bottom:10px}
.d-meta{font-size:10px;color:#9a9aa0;display:flex;gap:8px}
.d-tag{background:#f5f3f0;padding:2px 8px;border-radius:10px;color:#7a7a8a}
.d-exp{font-size:10px;color:var(--c,#999);margin-top:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase}

/* Lesson */
.lesson{position:absolute;width:220px;background:#fff;border:2px solid #e8e5e0;
  border-radius:12px;padding:14px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,0.04);
  transition:all .25s;user-select:none;opacity:0;transform:translateY(8px)}
.lesson.show{opacity:1;transform:translateY(0)}
.lesson:hover{border-color:var(--c,#ccc);box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.l-title{font-size:12px;font-weight:700;margin-bottom:4px}
.l-desc{font-size:10px;color:#8a8a9a;line-height:1.5;margin-bottom:6px}
.l-status{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:8px;display:inline-block}
.st-concept{background:#f0eef8;color:#8b7ac0}
.st-built{background:#e8f5ed;color:#4a9a6a}
.l-exp{font-size:9px;color:#aaa;margin-top:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase}

/* Phase */
.phase{position:absolute;width:180px;background:#fff;border:2px solid #eeebe8;
  border-radius:10px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,0.03);
  transition:all .25s;opacity:0;transform:scale(0.95);user-select:none}
.phase.show{opacity:1;transform:scale(1)}
.ph-label{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.ph-teach{color:#7c6bb5}.ph-guided{color:#c89030}.ph-sprint{color:#4a9a6a}.ph-wrapup{color:#4a8ab5}
.ph-title{font-size:11px;font-weight:600;color:#3a3a4a;margin-bottom:3px}
.ph-desc{font-size:9px;color:#8a8a9a;line-height:1.4}
.ph-game{font-size:10px;color:#6d5cae;margin-top:5px;font-weight:600;cursor:pointer;text-decoration:underline}
.ph-game:hover{color:#4a3a8a}
.ph-notes{width:100%;margin-top:6px;background:#faf9f8;border:1px solid #e8e5e0;border-radius:6px;
  padding:5px 7px;font-size:9px;color:#6a6a7a;font-family:'Inter',sans-serif;resize:vertical;min-height:28px;outline:none}
.ph-notes:focus{border-color:#b0a8d0;color:#3a3a4a}
.ph-notes::placeholder{color:#c0c0c8}

/* ══ GAME DETAIL PANEL ══ */
#detail-panel{position:fixed;top:48px;right:0;width:420px;height:calc(100vh - 48px);
  background:#fff;border-left:1px solid #e0ddd8;z-index:90;overflow-y:auto;
  transform:translateX(100%);transition:transform .3s ease-out;box-shadow:-4px 0 20px rgba(0,0,0,0.06)}
#detail-panel.open{transform:translateX(0)}
#dp-close{position:sticky;top:0;background:#fff;padding:12px 16px;border-bottom:1px solid #eee;
  display:flex;justify-content:space-between;align-items:center;z-index:2}
#dp-close span{font-size:13px;font-weight:700;color:#2a2a3a}
#dp-close button{background:none;border:none;font-size:18px;cursor:pointer;color:#999;padding:4px 8px}
#dp-body{padding:16px}

.dp-section{margin-bottom:20px}
.dp-section-title{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  color:#8a8a9a;margin-bottom:8px}

.dp-beat{background:#faf9f8;border:1px solid #eee;border-radius:8px;padding:10px 12px;margin-bottom:8px;position:relative}
.dp-beat-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.dp-beat-label.teach{color:#7c6bb5}
.dp-beat-label.guided{color:#c89030}
.dp-beat-label.sprint{color:#4a9a6a}
.dp-beat-label.narrative{color:#6a6a7a}
.dp-beat-label.finale{color:#d04a80}
.dp-beat-text{font-size:11px;color:#4a4a5a;line-height:1.6}
.dp-beat-notes{width:100%;margin-top:6px;background:#fff;border:1px solid #e8e5e0;border-radius:5px;
  padding:5px 7px;font-size:9px;color:#6a6a7a;font-family:'Inter',sans-serif;resize:vertical;min-height:26px;outline:none}
.dp-beat-notes:focus{border-color:#b0a8d0}
.dp-beat-notes::placeholder{color:#c8c8d0}

.dp-skills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.dp-skill{font-size:9px;font-weight:700;padding:3px 10px;border-radius:12px;
  background:#f0eef8;color:#6d5cae}

.dp-link{font-size:11px;color:#6d5cae;font-weight:600;text-decoration:underline;cursor:pointer;display:inline-block;margin-bottom:12px}
.dp-link:hover{color:#4a3a8a}

#minimap{position:fixed;bottom:16px;right:16px;width:200px;height:110px;
  background:rgba(255,255,255,0.95);border:1px solid #e0ddd8;border-radius:10px;
  z-index:80;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06);transition:right .3s}
#minimap.shifted{right:436px}
#minimap-view{position:absolute;border:2px solid #6d5cae;background:rgba(109,92,174,0.06);border-radius:2px;pointer-events:none}
.mm-d{position:absolute;border-radius:2px}
</style>
</head>
<body>

<div id="toolbar">
  <h1>Game Storyboard</h1>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="zoomIn()">+</button>
  <button class="tb-btn" onclick="zoomOut()">−</button>
  <button class="tb-btn" onclick="resetView()">Reset</button>
  <span id="zoom-label">85%</span>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="collapseAll()">Collapse</button>
  <button class="tb-btn" onclick="expandAll()">Expand</button>
  <span class="tb-help">Scroll zoom · Drag pan · Click to expand · Click 🎮 to see game detail</span>
</div>

<div id="viewport">
  <svg id="connectors" width="12000" height="8000"></svg>
  <div id="board"></div>
</div>

<div id="detail-panel">
  <div id="dp-close"><span id="dp-title">Game Detail</span><button onclick="closeDetail()">✕</button></div>
  <div id="dp-body"></div>
</div>

<div id="minimap"></div>

    lessons:[
      {title:'Lesson 1: CVC Words',desc:'Cat, sun, map.',status:'built',
        phases:[
          {type:'teach',title:'Building words',desc:'C-A-T = cat.',notes:'',game:''},
          {type:'guided',title:'Build with help',desc:'Place letters with hints.',notes:'',game:''},
          {type:'sprint',title:'Spell Caster',desc:'Build from scattered tiles.',notes:'',game:'spell-caster.html'},
          {type:'wrapup',title:'Review',desc:'Build words!',notes:'',game:''}]},
    ]},
  {id:'encode',num:6,title:'Encoding',color:'#c04a8a',sub:'Hear → segment → write. Spelling.',
    lessons:[
      {title:'Lesson 1: CVC Spelling',desc:'Hear, spell letter by letter.',status:'concept',
        phases:[
          {type:'teach',title:'Spelling = decoding backwards',desc:'Listen, write each letter.',notes:'',game:''},
          {type:'guided',title:'Spell with help',desc:'Segmented, place letters.',notes:'',game:''},
          {type:'sprint',title:'Spell Writer',desc:'Hear, write from memory.',notes:'Not built',game:''},

// ══════════════════════════════════════
// LAYOUT
// ══════════════════════════════════════
const DX=80,DY=80,DH=160,DVG=40,LXO=300,LVG=16,LH=120,PXO=260,PHG=16,PH=180;
const board=document.getElementById('board'),svg=document.getElementById('connectors');
let expanded={},lExpanded={};

function calcH(d){
  if(!expanded[d.id])return DH;
  let h=0;
  d.lessons.forEach((l,li)=>{
    const k=d.id+'-'+li;
    if(lExpanded[k]) h+=Math.max(LH,l.phases.length*(PH+PHG))+LVG;
    else h+=LH+LVG;
  });
  return Math.max(DH,h+40);
}

function render(){
  board.innerHTML='';svg.innerHTML='';
  let curY=DY;
  DOMAINS.forEach((d,di)=>{
    const dy=curY,dh=calcH(d);
    // Domain card
    const el=document.createElement('div');el.className='domain';
    el.style.cssText=`left:${DX}px;top:${dy}px;--c:${d.color}`;
    el.innerHTML=`<div class="d-head"><div class="d-num">${d.num}</div><div class="d-title">${d.title}</div></div>
      <div class="d-sub">${d.sub}</div>
      <div class="d-meta"><span class="d-tag">${d.lessons.length} lessons</span><span class="d-tag">${d.lessons.filter(l=>l.status==='built').length} built</span></div>
      <div class="d-exp">${expanded[d.id]?'▾ Collapse':'▸ Expand'}</div>`;
    el.onclick=e=>{e.stopPropagation();toggleD(d.id);};
    board.appendChild(el);
    if(di<DOMAINS.length-1) addLine(DX+130,dy+DH,DX+130,curY+dh+DVG,'connector-domain');

    if(expanded[d.id]){
      let ly=dy+10;
      d.lessons.forEach((l,li)=>{
        const lx=DX+LXO,lkey=d.id+'-'+li;
        addLine(DX+260,dy+80,lx,ly+40,'connector-lesson');
        const lel=document.createElement('div');lel.className='lesson show';
        lel.style.cssText=`left:${lx}px;top:${ly}px;--c:${d.color};transition-delay:${li*50}ms`;
        const sc=l.status==='built'?'st-built':'st-concept';
        lel.innerHTML=`<div class="l-title">${l.title}</div><div class="l-desc">${l.desc}</div>
          <span class="l-status ${sc}">${l.status}</span>
          <div class="l-exp">${lExpanded[lkey]?'▾ Collapse':'▸ Phases'}</div>`;
        lel.onclick=e=>{e.stopPropagation();toggleL(lkey);};
        board.appendChild(lel);

        if(lExpanded[lkey]){
          l.phases.forEach((p,pi)=>{
            const px=lx+PXO,py=ly+pi*(PH+PHG);
            if(pi===0)addLine(lx+220,ly+50,px,py+30,'connector-lesson');
            if(pi>0)addLine(px+90,ly+(pi-1)*(PH+PHG)+PH,px+90,py,'connector-lesson');
            const pel=document.createElement('div');pel.className='phase show';
            pel.style.cssText=`left:${px}px;top:${py}px;transition-delay:${pi*60}ms`;
            const tc={teach:'Teach',guided:'Guided',sprint:'Sprint',wrapup:'Wrap-up'}[p.type];
            let gameLink='';
            if(p.game){
              gameLink=`<div class="ph-game" onclick="event.stopPropagation();openDetail('${p.game}')">🎮 ${p.game}</div>`;
            }
            pel.innerHTML=`<div class="ph-label ph-${p.type}">${tc}</div>
              <div class="ph-title">${p.title}</div><div class="ph-desc">${p.desc}</div>
              ${gameLink}
              <textarea class="ph-notes" placeholder="Notes…" onclick="event.stopPropagation()">${p.notes||''}</textarea>`;
            pel.querySelector('.ph-notes').addEventListener('input',function(){p.notes=this.value;});
            board.appendChild(pel);
          });
          ly+=l.phases.length*(PH+PHG)+LVG;
        } else {ly+=LH+LVG;}
      });
    }
    curY+=dh+DVG;
  });
  updateMM();
}

function addLine(x1,y1,x2,y2,c){const l=document.createElementNS('http://www.w3.org/2000/svg','path');
  const m=(y1+y2)/2;l.setAttribute('d',`M${x1},${y1} C${x1},${m} ${x2},${m} ${x2},${y2}`);
  l.setAttribute('class',c);svg.appendChild(l);}
function toggleD(id){expanded[id]=!expanded[id];if(!expanded[id])Object.keys(lExpanded).forEach(k=>{if(k.startsWith(id))delete lExpanded[k];});render();}
function toggleL(k){lExpanded[k]=!lExpanded[k];render();}
function collapseAll(){expanded={};lExpanded={};render();}
function expandAll(){DOMAINS.forEach(d=>{expanded[d.id]=true;d.lessons.forEach((_,li)=>{lExpanded[d.id+'-'+li]=true;});});render();}

// ══════════════════════════════════════
// GAME DETAIL PANEL
// ══════════════════════════════════════
function openDetail(file){
  const g=GAME_DETAILS[file];
  if(!g)return;
  const panel=document.getElementById('detail-panel');
  const body=document.getElementById('dp-body');
  document.getElementById('dp-title').textContent=g.title;

  let html=`<a class="dp-link" href="minigame prototypes/${g.file}" target="_blank">▶ Play this game</a>`;
  html+=`<div class="dp-section"><div class="dp-section-title">Target Skill</div><div style="font-size:12px;color:#3a3a4a;margin-bottom:12px">${g.skill}</div></div>`;
  html+=`<div class="dp-section"><div class="dp-section-title">Skills Invoked</div><div class="dp-skills">${g.skills_invoked.map(s=>`<span class="dp-skill">${s}</span>`).join('')}</div></div>`;
  html+=`<div class="dp-section"><div class="dp-section-title">Storyboard</div>`;
  g.beats.forEach((b,i)=>{
    html+=`<div class="dp-beat">
      <div class="dp-beat-label ${b.label}">${b.label}</div>
      <div class="dp-beat-text">${b.text}</div>
      <textarea class="dp-beat-notes" placeholder="Notes / bugs…" data-game="${file}" data-beat="${i}">${b.notes||''}</textarea>
    </div>`;
  });
  html+=`</div>`;
  body.innerHTML=html;

  // Wire up notes saving
  body.querySelectorAll('.dp-beat-notes').forEach(ta=>{
    ta.addEventListener('input',function(){
      const gf=this.dataset.game, bi=parseInt(this.dataset.beat);
      if(GAME_DETAILS[gf]) GAME_DETAILS[gf].beats[bi].notes=this.value;
    });
  });

  panel.classList.add('open');
  document.getElementById('minimap').classList.add('shifted');
}

function closeDetail(){
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('minimap').classList.remove('shifted');
}

// ══════════════════════════════════════
// PAN & ZOOM
// ══════════════════════════════════════
let panX=20,panY=0,zoom=0.85,dragging=false,dsx=0,dsy=0,psx=0,psy=0;
const vp=document.getElementById('viewport');
function applyT(){board.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
  svg.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
  document.getElementById('zoom-label').textContent=Math.round(zoom*100)+'%';updateMM();}
vp.addEventListener('pointerdown',e=>{if(e.target===vp||e.target===svg){dragging=true;dsx=e.clientX;dsy=e.clientY;psx=panX;psy=panY;}});
window.addEventListener('pointermove',e=>{if(!dragging)return;panX=psx+(e.clientX-dsx);panY=psy+(e.clientY-dsy);applyT();});
window.addEventListener('pointerup',()=>{dragging=false;});
vp.addEventListener('wheel',e=>{e.preventDefault();const d=e.deltaY>0?0.97:1.03;const nz=Math.max(0.2,Math.min(2.5,zoom*d));
  const r=vp.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  panX=mx-(mx-panX)*(nz/zoom);panY=my-(my-panY)*(nz/zoom);zoom=nz;applyT();},{passive:false});
function zoomIn(){zoom=Math.min(2.5,zoom*1.08);applyT();}
function zoomOut(){zoom=Math.max(0.2,zoom*0.92);applyT();}
function resetView(){panX=20;panY=0;zoom=0.85;applyT();}

// Minimap
function updateMM(){const mm=document.getElementById('minimap'),mw=200,mh=110;
  let th=DY;DOMAINS.forEach(d=>{th+=calcH(d)+DVG;});const tw=DX+LXO+PXO+200;
  const s=Math.min(mw/tw,mh/th);let cy=DY,dots='';
  DOMAINS.forEach(d=>{const h=calcH(d);dots+=`<div class="mm-d" style="left:${DX*s}px;top:${cy*s}px;width:${260*s}px;height:${Math.min(h,DH)*s}px;background:${d.color}22;border:1px solid ${d.color}55"></div>`;cy+=h+DVG;});
  const r=vp.getBoundingClientRect(),vx=(-panX/zoom)*s,vy=(-panY/zoom)*s,vw=(r.width/zoom)*s,vh=(r.height/zoom)*s;
  mm.innerHTML=dots+`<div id="minimap-view" style="left:${vx}px;top:${vy}px;width:${vw}px;height:${vh}px"></div>`;}

// Init
render();applyT();
</script>
</body>
</html>
