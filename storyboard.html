<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OL Prototypes — Game Storyboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;overflow:hidden;font-family:'Inter',sans-serif;height:100vh;width:100vw;color:#e0dce8}

/* Toolbar */
#toolbar{position:fixed;top:0;left:0;right:0;height:48px;z-index:100;
  background:rgba(26,26,46,0.95);border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;padding:0 16px;gap:16px;backdrop-filter:blur(8px)}
#toolbar h1{font-size:14px;font-weight:700;color:#a78bfa;letter-spacing:1px}
.tb-sep{width:1px;height:24px;background:rgba(255,255,255,0.08)}
.tb-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  border-radius:6px;padding:6px 12px;font-size:11px;font-weight:600;color:#a0a0b8;
  cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif}
.tb-btn:hover{background:rgba(255,255,255,0.1);color:#fff}
#zoom-label{font-size:11px;color:#666;min-width:50px;text-align:center}
.tb-help{font-size:10px;color:#555;margin-left:auto}

/* Canvas area */
#viewport{position:fixed;top:48px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab}
#viewport:active{cursor:grabbing}
#board{position:absolute;transform-origin:0 0;will-change:transform}

/* Domain cards */
.domain{
  position:absolute;width:240px;
  background:rgba(30,28,50,0.95);border:2px solid var(--domain-color,#555);
  border-radius:16px;padding:20px;cursor:pointer;
  transition:box-shadow .2s;user-select:none}
.domain:hover{box-shadow:0 0 20px var(--domain-glow,rgba(100,100,100,0.2))}
.domain-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.domain-num{width:28px;height:28px;border-radius:50%;background:var(--domain-color,#555);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff}
.domain-title{font-size:14px;font-weight:700;color:#fff}
.domain-sub{font-size:11px;color:#888;line-height:1.5;margin-bottom:10px}
.domain-meta{font-size:10px;color:#555;display:flex;gap:8px}
.domain-tag{background:rgba(255,255,255,0.06);padding:2px 8px;border-radius:10px}
.domain-expand{font-size:10px;color:var(--domain-color,#888);margin-top:10px;
  font-weight:600;letter-spacing:1px;text-transform:uppercase}

/* Lesson cards */
.lesson{
  position:absolute;width:200px;
  background:rgba(26,24,44,0.95);border:2px solid rgba(255,255,255,0.08);
  border-radius:12px;padding:14px;cursor:pointer;
  transition:all .2s;user-select:none;opacity:0;transform:translateY(10px)}
.lesson.show{opacity:1;transform:translateY(0)}
.lesson:hover{border-color:var(--domain-color,#555);box-shadow:0 0 12px var(--domain-glow,rgba(100,100,100,0.1))}
.lesson-title{font-size:12px;font-weight:700;color:#ddd;margin-bottom:4px}
.lesson-desc{font-size:10px;color:#777;line-height:1.5;margin-bottom:6px}
.lesson-status{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  padding:2px 8px;border-radius:8px;display:inline-block}
.status-concept{background:rgba(168,139,250,0.15);color:#a78bfa}
.status-built{background:rgba(94,199,122,0.15);color:#5ec77a}
.status-planned{background:rgba(245,196,105,0.15);color:#f5c469}
.lesson-expand{font-size:9px;color:#555;margin-top:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase}

/* Phase cards */
.phase{
  position:absolute;width:170px;
  background:rgba(22,20,40,0.95);border:2px solid rgba(255,255,255,0.06);
  border-radius:10px;padding:12px;
  transition:all .2s;opacity:0;transform:scale(0.9);user-select:none}
.phase.show{opacity:1;transform:scale(1)}
.phase-label{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  margin-bottom:6px}
.phase-teach{color:#a78bfa}
.phase-guided{color:#f5c469}
.phase-sprint{color:#5ec77a}
.phase-wrapup{color:#6fb3f2}
.phase-title{font-size:11px;font-weight:600;color:#ccc;margin-bottom:4px}
.phase-desc{font-size:9px;color:#666;line-height:1.5}
.phase-game{font-size:10px;color:#888;margin-top:6px;font-style:italic}
.phase-notes{width:100%;margin-top:8px;background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:6px 8px;
  font-size:9px;color:#888;font-family:'Inter',sans-serif;resize:vertical;min-height:32px;
  outline:none}
.phase-notes:focus{border-color:rgba(139,92,246,0.4);color:#aaa}
.phase-notes::placeholder{color:#444}

/* Connectors (SVG) */
#connectors{position:absolute;top:0;left:0;pointer-events:none;z-index:-1}
.connector{stroke:rgba(255,255,255,0.08);stroke-width:2;fill:none}
.connector-domain{stroke:rgba(139,92,246,0.3);stroke-width:2;stroke-dasharray:8 4}
.connector-lesson{stroke:rgba(255,255,255,0.06);stroke-width:1.5}

/* Minimap */
#minimap{position:fixed;bottom:16px;right:16px;width:180px;height:100px;
  background:rgba(20,18,36,0.9);border:1px solid rgba(255,255,255,0.1);border-radius:8px;
  z-index:100;overflow:hidden}
#minimap-view{position:absolute;border:1px solid rgba(139,92,246,0.5);background:rgba(139,92,246,0.08);
  pointer-events:none}
.mm-domain{position:absolute;border-radius:2px}
</style>
</head>
<body>

<div id="toolbar">
  <h1>Game Storyboard</h1>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="zoomIn()">Zoom +</button>
  <button class="tb-btn" onclick="zoomOut()">Zoom −</button>
  <button class="tb-btn" onclick="resetView()">Reset</button>
  <span id="zoom-label">100%</span>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="collapseAll()">Collapse All</button>
  <button class="tb-btn" onclick="expandAll()">Expand All</button>
  <span class="tb-help">Scroll to zoom · Drag to pan · Click cards to expand</span>
</div>

<div id="viewport">
  <svg id="connectors" width="8000" height="5000"></svg>
  <div id="board"></div>
</div>

<div id="minimap"></div>

<script>

// ══════════════════════════════════════
// LAYOUT
// ══════════════════════════════════════
const DOMAIN_X_START = 100;
const DOMAIN_Y = 100;
const DOMAIN_GAP = 320;
const LESSON_Y_OFFSET = 260;
const LESSON_GAP = 220;
const PHASE_Y_OFFSET = 240;
const PHASE_GAP = 200;

const board = document.getElementById('board');
const svg = document.getElementById('connectors');
let expanded = {}; // { domainId: true/false }
let lessonExpanded = {}; // { 'domainId-lessonIdx': true/false }

function render() {
  board.innerHTML = '';
  svg.innerHTML = '';

  DOMAINS.forEach((d, di) => {
    const dx = DOMAIN_X_START + di * DOMAIN_GAP;
    const dy = DOMAIN_Y;

    // Domain card
    const el = document.createElement('div');
    el.className = 'domain';
    el.style.cssText = `left:${dx}px;top:${dy}px;--domain-color:${d.color};--domain-glow:${d.color}33`;
    el.innerHTML = `
      <div class="domain-header">
        <div class="domain-num">${d.num}</div>
        <div class="domain-title">${d.title}</div>
      </div>
      <div class="domain-sub">${d.sub}</div>
      <div class="domain-meta">
        <span class="domain-tag">${d.lessons.length} lessons</span>
        <span class="domain-tag">${d.lessons.filter(l=>l.status==='built').length} built</span>
      </div>
      <div class="domain-expand">${expanded[d.id] ? '▾ Collapse' : '▸ Expand lessons'}</div>
    `;
    el.onclick = (e) => { e.stopPropagation(); toggleDomain(d.id); };
    board.appendChild(el);

    // Domain connector to next
    if (di < DOMAINS.length - 1) {
      const nx = DOMAIN_X_START + (di + 1) * DOMAIN_GAP;
      addLine(dx + 240, dy + 60, nx, dy + 60, 'connector-domain');
    }

    // Lessons
    if (expanded[d.id]) {
      d.lessons.forEach((l, li) => {
        const lx = dx - 20;
        const ly = dy + LESSON_Y_OFFSET + li * LESSON_GAP;
        const lkey = d.id + '-' + li;

        // Connector domain → lesson
        addLine(dx + 120, dy + 140, lx + 100, ly, 'connector-lesson');
        // Connector between lessons
        if (li > 0) {
          const prevLy = dy + LESSON_Y_OFFSET + (li - 1) * LESSON_GAP;
          addLine(lx + 100, prevLy + 120, lx + 100, ly, 'connector-lesson');
        }

        const lel = document.createElement('div');
        lel.className = 'lesson show';
        lel.style.cssText = `left:${lx}px;top:${ly}px;--domain-color:${d.color};--domain-glow:${d.color}33;transition-delay:${li * 60}ms`;
        const statusClass = l.status === 'built' ? 'status-built' : l.status === 'planned' ? 'status-planned' : 'status-concept';
        lel.innerHTML = `
          <div class="lesson-title">${l.title}</div>
          <div class="lesson-desc">${l.desc}</div>
          <span class="lesson-status ${statusClass}">${l.status}</span>
          <div class="lesson-expand">${lessonExpanded[lkey] ? '▾ Collapse' : '▸ Show phases'}</div>
        `;
        lel.onclick = (e) => { e.stopPropagation(); toggleLesson(lkey); };
        board.appendChild(lel);

        // Phases
        if (lessonExpanded[lkey]) {
          l.phases.forEach((p, pi) => {
            const px = lx + 230 + pi * PHASE_GAP;
            const py = ly + 20;

            // Connector
            if (pi === 0) addLine(lx + 200, ly + 60, px, py + 40, 'connector-lesson');
            if (pi > 0) addLine(px - PHASE_GAP + 170, py + 40, px, py + 40, 'connector-lesson');

            const pel = document.createElement('div');
            pel.className = 'phase show';
            pel.style.cssText = `left:${px}px;top:${py}px;transition-delay:${pi * 80}ms`;
            const typeLabel = {teach:'Teach',guided:'Guided',sprint:'Sprint',wrapup:'Wrap-up'}[p.type];
            const typeClass = 'phase-' + p.type;
            pel.innerHTML = `
              <div class="phase-label ${typeClass}">${typeLabel}</div>
              <div class="phase-title">${p.title}</div>
              <div class="phase-desc">${p.desc}</div>
              ${p.game ? `<div class="phase-game">🎮 ${p.game}</div>` : ''}
              <textarea class="phase-notes" placeholder="Add notes..." onclick="event.stopPropagation()">${p.notes || ''}</textarea>
            `;
            // Save notes on change
            const ta = pel.querySelector('.phase-notes');
            ta.addEventListener('input', () => { p.notes = ta.value; });
            board.appendChild(pel);
          });
        }
      });
    }
  });

  updateMinimap();
}

function addLine(x1, y1, x2, y2, cls) {
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  // Curved connector
  const mx = (x1 + x2) / 2;
  line.setAttribute('d', `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
  line.setAttribute('class', cls || 'connector');
  svg.appendChild(line);
}

function toggleDomain(id) {
  expanded[id] = !expanded[id];
  if (!expanded[id]) {
    // Collapse all lessons within
    Object.keys(lessonExpanded).forEach(k => { if (k.startsWith(id)) delete lessonExpanded[k]; });
  }
  render();
}

function toggleLesson(key) {
  lessonExpanded[key] = !lessonExpanded[key];
  render();
}

function collapseAll() {
  expanded = {};
  lessonExpanded = {};
  render();
}

function expandAll() {
  DOMAINS.forEach(d => {
    expanded[d.id] = true;
    d.lessons.forEach((_, li) => { lessonExpanded[d.id + '-' + li] = true; });
  });
  render();
}

// ══════════════════════════════════════
// PAN & ZOOM
// ══════════════════════════════════════
let panX = 0, panY = 0, zoom = 1;
let dragging = false, dragStartX = 0, dragStartY = 0, panStartX = 0, panStartY = 0;
const viewport = document.getElementById('viewport');

function applyTransform() {
  board.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
  svg.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
  document.getElementById('zoom-label').textContent = Math.round(zoom * 100) + '%';
  updateMinimap();
}

viewport.addEventListener('pointerdown', e => {
  if (e.target === viewport || e.target === svg) {
    dragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    panStartX = panX;
    panStartY = panY;
  }
});
window.addEventListener('pointermove', e => {
  if (!dragging) return;
  panX = panStartX + (e.clientX - dragStartX);
  panY = panStartY + (e.clientY - dragStartY);
  applyTransform();
});
window.addEventListener('pointerup', () => { dragging = false; });

viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newZoom = Math.max(0.15, Math.min(3, zoom * delta));
  // Zoom toward cursor
  const rect = viewport.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  panX = mx - (mx - panX) * (newZoom / zoom);
  panY = my - (my - panY) * (newZoom / zoom);
  zoom = newZoom;
  applyTransform();
}, { passive: false });

function zoomIn() { zoom = Math.min(3, zoom * 1.2); applyTransform(); }
function zoomOut() { zoom = Math.max(0.15, zoom * 0.8); applyTransform(); }
function resetView() { panX = 0; panY = 0; zoom = 0.85; applyTransform(); }

// ══════════════════════════════════════
// MINIMAP
// ══════════════════════════════════════
function updateMinimap() {
  const mm = document.getElementById('minimap');
  const mmW = 180, mmH = 100;
  const boardW = DOMAINS.length * DOMAIN_GAP + 200;
  const boardH = 2000;
  const scaleX = mmW / boardW;
  const scaleY = mmH / boardH;
  const s = Math.min(scaleX, scaleY);

  // Draw domain dots
  let dotsHtml = '';
  DOMAINS.forEach((d, i) => {
    const x = (DOMAIN_X_START + i * DOMAIN_GAP) * s;
    const y = DOMAIN_Y * s;
    dotsHtml += `<div class="mm-domain" style="left:${x}px;top:${y}px;width:${240*s}px;height:${100*s}px;background:${d.color}33;border:1px solid ${d.color}55"></div>`;
  });

  // Viewport rectangle
  const rect = viewport.getBoundingClientRect();
  const vx = (-panX / zoom) * s;
  const vy = (-panY / zoom) * s;
  const vw = (rect.width / zoom) * s;
  const vh = (rect.height / zoom) * s;

  mm.innerHTML = dotsHtml + `<div id="minimap-view" style="left:${vx}px;top:${vy}px;width:${vw}px;height:${vh}px"></div>`;
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
render();
resetView();
</script>
</body>
